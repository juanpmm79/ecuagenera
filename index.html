<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bulbophyllum Explorer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        // Extraemos los componentes de React
        const { useState, useEffect } = React;

        // Componente de Icono para Lucide (Adaptación para navegador)
        const Icon = ({ name, className = "w-5 h-5" }) => {
            useEffect(() => {
                lucide.createIcons();
            }, [name]);
            return <i data-lucide={name} className={className}></i>;
        };

        const BulbophyllumApp = () => {
            const [selectedTaxon, setSelectedTaxon] = useState(null);
            const [searchTerm, setSearchTerm] = useState('');

            const generalCare = {
                es: [
                    { id: 'hydration', icon: 'droplets', title: 'Hidratación', content: 'Humedad constante en las raíces. Bandejas con 0.6 cm de agua debajo de macetas para microclima de alta presión de vapor. Preferencia por agua de lluvia u ósmosis inversa.' },
                    { id: 'light', icon: 'sun', title: 'Luz', content: 'Entre 3,000 y 5,000 bujías-pie (15,000 a 20,000 lux). Sombra borrosa e indistinta. Malla Aluminet al 50% en verano previene daños térmicos.' },
                    { id: 'temp', icon: 'thermometer', title: 'Temperatura', content: 'Rango de 15°C a 32°C. Caída nocturna de 6°C a 8°C para inducir floración. Evitar temperaturas sobre 40.5°C.' },
                    { id: 'substrate', icon: 'box', title: 'Sustrato', content: 'Macetas de plástico impermeables. Mezcla 50:50 de musgo sphagnum y perlita. Trasplante cada tres años en primavera u otoño.' },
                    { id: 'humidity', icon: 'wind', title: 'Humedad Ambiental', content: 'Mínimo 75% constante. Circulación de aire vigorosa previene patógenos como Botrytis.' }
                ],
                en: [
                    { id: 'hydration', title: 'Hydration', content: 'Constant root moisture. Trays with 0.25 inches (0.6 cm) of water beneath plastic pots. Rainwater or RO water strictly preferred.' },
                    { id: 'light', title: 'Light', content: '3,000 to 5,000 foot-candles (15,000 to 20,000 lux). Fuzzy shadow test. 50% Aluminet shade cloth recommended in peak summer.' },
                    { id: 'temp', title: 'Thermal', content: 'Range of 60°F to 90°F (15°C to 32°C). Diurnal shift of 6°C to 8°C required. Avoid temperatures exceeding 105°F.' },
                    { id: 'substrate', title: 'Substrate', content: 'Plastic pots preferred. 50:50 premium sphagnum and perlite mix. Repot every three years during active growth.' },
                    { id: 'humidity', title: 'Humidity', content: '75% baseline relative humidity. Vigorous air circulation required to prevent fungal pathogens.' }
                ]
            };

            const taxa = [
                { name: "Bulbophyllum mirum", en: "Described by Johannes Jacobus Smith in 1906. Native to Peninsular Thailand, Sumatra, Borneo, Java, Bali, and Flores.", es: "Descrita por Johannes Jacobus Smith en 1906. Nativa de Tailandia peninsular, Sumatra, Borneo, Java, Bali y Flores." },
                { name: "Bulbophyllum speciosum", en: "Described by Rudolf Schlechter in 1912. Originates from forests of Papua New Guinea (600-1,200m).", es: "Descrita por Rudolf Schlechter en 1912. Originaria de los bosques de Papúa Nueva Guinea (600-1,200 m)." },
                { name: "Bulbophyllum translucidum", en: "Described in 2016. Endemic to the Philippines (Dinagat, Leyte, Mindanao, Samar).", es: "Descrita en 2016. Endémica de Filipinas (Dinagat, Leyte, Mindanao, Samar)." },
                { name: "Bulbophyllum Elizabeth Ann 'Buckleberry'", en: "Hybrid of B. longissimum and B. rothschildianum. Registered in 1969. Awarded FCC and CCE by AOS.", es: "Híbrido de B. longissimum y B. rothschildianum. Registrado en 1969. Premiado con FCC y CCE por la AOS." },
                { name: "Bulbophyllum macranthum", en: "Described by John Lindley. Wide distribution in Southeast Asia. Large, fleshy flowers with a clove-like scent.", es: "Descrita por John Lindley. Amplia distribución en el sudeste asiático. Flores grandes y carnosas con aroma a clavo." },
                { name: "Bulbophyllum elevatopunctatum", en: "Described by J.J. Smith. Features raised, blister-like dots on flowers. Mimics biological debris.", es: "Descrita por J.J. Smith. Presenta puntos elevados tipo ampolla en las flores. Imita desechos biológicos." },
                { name: "Bulbophyllum bolsteri", en: "Named by Oakes Ames. Endemic to the Philippines. Named after field collectors of the early 20th century.", es: "Nombrada por Oakes Ames. Endémica de Filipinas. Honra a recolectores de principios del siglo XX." },
                { name: "Bulbophyllum crassipes", en: "Documented by Joseph Dalton Hooker in 1896. Found in China, Bhutan, India, Bangladesh, and Myanmar.", es: "Documentada por Joseph Dalton Hooker en 1896. Se encuentra en China, Bután, India, Bangladesh y Myanmar." },
                { name: "Bulbophyllum subcubicum", en: "Originally described by J.J. Smith in 1913. Pseudobulbs develop cubic shapes. Demands high ambient humidity.", es: "Descrita originalmente por J.J. Smith en 1913. Los pseudobulbos desarrollan formas cúbicas. Exige alta humedad ambiental." },
                { name: "Bulbophyllum falcatum", en: "African species revised by Reichenbach in 1861. Flattened rachis mimics a sickle.", es: "Especie africana revisada por Reichenbach en 1861. Raquis aplanado imita una hoz." },
                { name: "Bulbophyllum cephalophorum", en: "Described by Garay, Hamer, and Siegerist. Name means 'head-bearing'. Clustered flowers mimic a single decaying head.", es: "Descrita por Garay, Hamer y Siegerist. El nombre significa 'que lleva cabeza'. Flores agrupadas imitan una cabeza en descomposición." },
                { name: "Bulbophyllum thaiorum", en: "High-altitude cloud forest epiphyte (600-2,000m). Features papillose lateral sepals.", es: "Epífita de bosque nuboso de gran altitud (600-2,000 m). Posee sépalos laterales papilosos." },
                { name: "Bulbophyllum pecten-veneris", en: "Name means 'Venus's comb'. Parallel lateral sepals resemble comb teeth. Fine root system.", es: "El nombre significa 'peine de Venus'. Sépalos laterales paralelos parecen dientes de un peine. Raíces finas." },
                { name: "Bulbophyllum purpurascens", en: "Described by Teijsmann and Binnendijk. Name means 'becoming purple'. Photoprotective mechanism using anthocyanins.", es: "Descrita por Teijsmann y Binnendijk. El nombre significa 'volviéndose púrpura'. Mecanismo fotoprotector con antocianinas." },
                { name: "Bulbophyllum auratum flavum", en: "Xanthic mutation of B. auratum. Lacks red/purple pigments; flowers are pure yellow.", es: "Mutación xántica de B. auratum. Carece de pigmentos rojos/púrpuras; flores amarillo puro." },
                { name: "Bulbophyllum nitidum", en: "Described by Schlechter from New Guinea. Name means 'shining' or 'glossy'.", es: "Descrita por Schlechter en Nueva Guinea. El nombre significa 'brillante'." },
                { name: "Bulbophyllum infundibuliforme", en: "Leaves form a watertight biological funnel. Traps rain and debris to feed the roots.", es: "Hojas forman un embudo biológico hermético. Atrapa lluvia y desechos para alimentar las raíces." },
                { name: "Bulbophyllum vietnamense", en: "Endemic to Vietnam highlands. Bathed in freezing cloud fogs. Mandatory nocturnal temperature drop.", es: "Endémica de las tierras altas de Vietnam. Bañada en nieblas heladas. Caída nocturna obligatoria." },
                { name: "Bulbophyllum mucronatum alagense", en: "Found in Philippines and Sulawesi (1,400-1,600m). Sharp spine-like point at leaf apex.", es: "Se encuentra en Filipinas y Sulawesi (1,400-1,600 m). Punta afilada en el ápice de la hoja." },
                { name: "Bulbophyllum lasiochilum", en: "Fragrance mimics strawberry candy. Deviation from the genus's typical foul odors.", es: "Fragancia imita caramelos de fresa. Diferente a los olores fétidos típicos del género." },
                { name: "Bulbophyllum pardalotum", en: "Name means 'leopard-spotted'. Advanced disruptive coloration confuses insects.", es: "El nombre significa 'manchado como leopardo'. Coloración disruptiva confunde insectos." },
                { name: "Bulbophyllum saltatorium var. albociliatum", en: "Known as 'The Dancing Bulbophyllum'. White hairs on lip act as aerodynamic sails.", es: "Conocida como 'El Bulbophyllum Danzante'. Pelos blancos en el labelo actúan como velas." },
                { name: "Bulbophyllum inacootesiae", en: "Described in 2016. Endemic to Bukidnon, Mindanao (1,300-1,500m). Fragrance of fresh roses.", es: "Descrita en 2016. Endémica de Bukidnon, Mindanao (1,300-1,500 m). Aroma a rosas frescas." },
                { name: "Bulbophyllum treschii", en: "Described in 2012. Massively elongated lateral sepals. High metabolic cost of flowering.", es: "Descrita en 2012. Sépalos laterales masivamente alargados. Alto costo metabólico de floración." },
                { name: "Bulbophyllum retusiusculum", en: "Widespread Asian species. Name refers to notched leaf apex. Inflorescences form fan-like shapes.", es: "Especie asiática extendida. El nombre refiere al ápice de la hoja con muesca. Inflorescencias en forma de abanico." },
                { name: "Bulbophyllum odontopetalum", en: "Name means 'toothed petals'. Serrations provide grip for pollinators.", es: "El nombre significa 'pétalos dentados'. Las estrías dan agarre a los polinizadores." },
                { name: "Bulbophyllum maquilingense", en: "Endemic to the Philippines (0-1,000m). Named after Mount Makiling. Hot grower.", es: "Endémica de Filipinas (0-1,000 m). Nombrada por el Monte Makiling. Crecimiento cálido." },
                { name: "Bulbophyllum weberi", en: "Produces neon reddish-orange umbels. Shift away from fly pollination toward birds or butterflies.", es: "Produce umbelas naranja rojizo neón. Evolución hacia polinización por aves o mariposas." },
                { name: "Bulbophyllum trongquyetii", en: "Described in 2020 in Vietnam. Massive vegetative scale compared to relatives.", es: "Descrita en 2020 en Vietnam. Escala vegetativa masiva comparada con parientes." },
                { name: "Bulbophyllum tricanaliferum", en: "Name means 'bearing three channels'. Deep grooves on pseudobulbs act as gutters.", es: "El nombre significa 'que lleva tres canales'. Surcos profundos actúan como canaletas." },
                { name: "Bulbophyllum clandestinum", en: "Name means 'hidden' or 'secretive'. Tiny flowers remain against the rhizome.", es: "El nombre significa 'oculto'. Flores diminutas contra el rizoma, a menudo enterradas." },
                { name: "Bulbophyllum chrysendetum", en: "Mini-miniature endemic to Leyte, Philippines (600m). Comical pear-shaped pseudobulbs.", es: "Mini-miniatura endémica de Leyte, Filipinas (600 m). Pseudobulbos en forma de pera." },
                { name: "Bulbophyllum fascinator var. hampaliana", en: "Emerald-green base with dark purple spots. Emits foul odor of raw garbage.", es: "Base verde esmeralda con manchas púrpura oscuro. Emite olor fétido a basura." },
                { name: "Bulbophyllum maxillare", en: "Name refers to 'jaw-bone'. Mechanical structure mimics gaping jaws of a predator.", es: "El nombre refiere a 'mandíbula'. Estructura mecánica imita fauces de depredador." },
                { name: "Bulbophyllum sanguineopunctatum", en: "Name means 'blood-spotted'. Precise nectar guides mimic diseased matter.", es: "El nombre significa 'moteado de sangre'. Guías de néctar imitan materia enferma." },
                { name: "Bulbophyllum saurocephalum", en: "Name means 'lizard head'. Swollen, fleshy rachis resembles reptile scales.", es: "El nombre significa 'cabeza de lagarto'. Raquis carnoso imita escamas de reptil." },
                { name: "Bulbophyllum fascinator", en: "Wild-type parent. Concentrated odor of decaying meat or garbage. Sapromyiophilous pollination.", es: "Padre de tipo silvestre. Olor concentrado a carne podrida o basura. Polinización sapromiofílica." },
                { name: "Bulbophyllum 'Sprucei'", en: "Horticultural moniker named after Richard Spruce. Notoriously thirsty plants.", es: "Apodo hortícola por Richard Spruce. Plantas notoriamente sedientas." },
                { name: "Bulbophyllum corolliferum var. atropurpureum", en: "Sumatran miniature endemic. Dark black-purple color absorbs thermal energy.", es: "Miniatura endémica de Sumatra. Color negro-púrpura absorbe energía térmica en nieblas frías." },
                { name: "Bulbophyllum baileyi", en: "Native to Australia and New Guinea. Aggressive climbing rhizome. Pleasant fruity scent.", es: "Nativa de Australia y Nueva Guinea. Rizoma trepador agresivo. Aroma frutal agradable." },
                { name: "Bulbophyllum membranifolium", en: "Thin 'membranous' leaves lack waxy cuticle. Zero defense against rapid dehydration.", es: "Hojas membranosas delgadas sin cutícula cerosa. Sin defensa contra deshidratación rápida." },
                { name: "Bulbophyllum forrestii", en: "Forms perfect radial daisy-like umbels. High energy demand for flowering.", es: "Forma umbelas radiales como margaritas. Alta demanda energética para florar." },
                { name: "Bulbophyllum longiflorum", en: "Spans Africa, Madagascar, Asia, and Australia. Known as 'Pale Umbrella Orchid'.", es: "Abarca África, Madagascar, Asia y Australia. Conocida como 'Orquídea Paraguas Pálido'." },
                { name: "Bulbophyllum maximum", en: "African giant. Severely swollen, leaf-like rachis magnified to 'maximum' proportions.", es: "Gigante africana. Raquis aplanado y grande en proporciones 'máximas'." },
                { name: "Bulbophyllum vaginatum", en: "Mop-like inflorescence with fireworks effect. Aggressive grower.", es: "Inflorescencia tipo fregona con efecto fuegos artificiales. Crecimiento agresivo." },
                { name: "Bulbophyllum rothschildianum", en: "High-altitude titan (2,130m). Parent of 'Elizabeth Ann'. Large red-striped flowers.", es: "Titán de gran altitud (2,130 m). Padre de 'Elizabeth Ann'. Flores grandes con rayas rojas." },
                { name: "Bulbophyllum fenestratum", en: "Name means 'windowed'. Fused sepals have microscopic gaps acting as lightboxes.", es: "El nombre significa 'con ventanas'. Sépalos fusionados tienen huecos microscópicos." },
                { name: "Bulbophyllum grandiflorum", en: "Massive species from New Guinea. Huge dorsal sepal acts as an aerodynamic canopy.", es: "Especie masiva de Nueva Guinea. Sépalo dorsal gigante sirve de dosel." }
            ];

            const filteredTaxa = taxa.filter(t => 
                t.name.toLowerCase().includes(searchTerm.toLowerCase())
            );

            if (selectedTaxon) {
                return (
                    <div className="min-h-screen p-4 md:p-8">
                        <div className="max-w-4xl mx-auto">
                            <button 
                                onClick={() => setSelectedTaxon(null)}
                                className="flex items-center gap-2 text-emerald-700 hover:text-emerald-800 font-semibold mb-6"
                            >
                                <Icon name="chevron-left" /> Regresar / Back
                            </button>

                            <div className="bg-white rounded-2xl shadow-xl overflow-hidden border border-slate-200">
                                <div className="bg-emerald-700 p-6 text-white">
                                    <h1 className="text-3xl font-bold italic">{selectedTaxon.name}</h1>
                                </div>
                                <div className="p-6 grid md:grid-cols-2 gap-8">
                                    <section className="space-y-4">
                                        <div className="flex items-center gap-2 text-emerald-700 border-b pb-2">
                                            <Icon name="info" />
                                            <h2 className="text-xl font-bold">Información</h2>
                                        </div>
                                        <p className="text-slate-700 text-sm italic">Español:</p>
                                        <p className="text-slate-800 mb-4">{selectedTaxon.es}</p>
                                        <p className="text-slate-700 text-sm italic">English:</p>
                                        <p className="text-slate-800">{selectedTaxon.en}</p>
                                    </section>
                                    <section className="space-y-4">
                                        <div className="flex items-center gap-2 text-emerald-700 border-b pb-2">
                                            <Icon name="droplets" />
                                            <h2 className="text-xl font-bold">Cultivo / Care</h2>
                                        </div>
                                        {generalCare.es.map((item, idx) => (
                                            <div key={item.id} className="bg-slate-50 p-4 rounded-xl border">
                                                <div className="flex items-center gap-2 mb-2 text-emerald-800 font-bold uppercase text-xs">
                                                    <Icon name={item.icon} className="w-4 h-4" />
                                                    {item.title}
                                                </div>
                                                <p className="text-sm text-slate-700 mb-2">{item.content}</p>
                                                <p className="text-xs text-slate-500 italic border-t pt-1">{generalCare.en[idx].content}</p>
                                            </div>
                                        ))}
                                    </section>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen p-4 md:p-8">
                    <div className="max-w-6xl mx-auto">
                        <header className="text-center mb-12">
                            <h1 className="text-4xl md:text-5xl font-black text-emerald-900 mb-2">BULBOPHYLLUM EXPLORER</h1>
                            <p className="text-emerald-700 font-medium">Análisis Botánico y Hortícola</p>
                        </header>
                        <div className="relative max-w-xl mx-auto mb-12">
                            <div className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">
                                <Icon name="search" />
                            </div>
                            <input 
                                type="text"
                                placeholder="Buscar especie... / Search..."
                                className="w-full pl-12 pr-4 py-4 rounded-full bg-white shadow-lg border-none focus:ring-2 focus:ring-emerald-500 text-lg"
                                value={searchTerm}
                                onChange={(e) => setSearchTerm(e.target.value)}
                            />
                        </div>
                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
                            {filteredTaxa.map((taxon, index) => (
                                <button
                                    key={index}
                                    onClick={() => setSelectedTaxon(taxon)}
                                    className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 text-left hover:shadow-xl hover:border-emerald-300 transition-all group"
                                >
                                    <h3 className="text-xl font-bold italic text-slate-900 group-hover:text-emerald-700">{taxon.name}</h3>
                                    <p className="text-slate-500 text-sm mt-2 line-clamp-2">{taxon.es}</p>
                                    <div className="mt-4 text-emerald-600 text-xs font-bold uppercase tracking-widest">Detalles / Details →</div>
                                </button>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<BulbophyllumApp />);
    </script>
</body>
</html>
